<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aqua Clean Employee Suggestion & Request Form</title>
    
    <!-- Direct Qatar flag - will always work -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>馃嚩馃嚘</text></svg>">
    
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
        }
        .responsive-iframe-container {
            position: relative;
            width: 100%;
            height: 100vh;
            overflow: auto;
        }
        .responsive-iframe-container iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: 0;
            overflow: auto;
        }
    </style>
</head>
<body>
    <div class="responsive-iframe-container">
        <iframe src="https://script.google.com/macros/s/AKfycbw92SzBBiKeuplyQinMyNX0cO01cLXVLjKoYa_sDRJ7qP_tUwoaMu59KUFSOH3Q52bI/exec" allowfullscreen></iframe>
    </div>

    <script>
        // Simple emoji flag - works in all modern browsers
        function updateFavicon(countryCode) {
            try {
                // Map country codes to emoji flags
                const flagEmojis = {
                    'QA': '馃嚩馃嚘', 'IN': '馃嚠馃嚦', 'US': '馃嚭馃嚫', 'GB': '馃嚞馃嚙',
                    'AE': '馃嚘馃嚜', 'SA': '馃嚫馃嚘', 'KW': '馃嚢馃嚰', 'OM': '馃嚧馃嚥',
                    'BH': '馃嚙馃嚟', 'EG': '馃嚜馃嚞', 'JO': '馃嚡馃嚧', 'LB': '馃嚤馃嚙',
                    'IR': '馃嚠馃嚪', 'IQ': '馃嚠馃嚩', 'SY': '馃嚫馃嚲', 'YE': '馃嚲馃嚜',
                    'TR': '馃嚬馃嚪', 'PK': '馃嚨馃嚢', 'BD': '馃嚙馃嚛', 'MY': '馃嚥馃嚲',
                    'ID': '馃嚠馃嚛', 'PH': '馃嚨馃嚟', 'SG': '馃嚫馃嚞', 'TH': '馃嚬馃嚟',
                    'VN': '馃嚮馃嚦', 'CN': '馃嚚馃嚦', 'JP': '馃嚡馃嚨', 'KR': '馃嚢馃嚪',
                    'RU': '馃嚪馃嚭', 'DE': '馃嚛馃嚜', 'FR': '馃嚝馃嚪', 'IT': '馃嚠馃嚬',
                    'ES': '馃嚜馃嚫', 'PT': '馃嚨馃嚬', 'NL': '馃嚦馃嚤', 'BE': '馃嚙馃嚜',
                    'CH': '馃嚚馃嚟', 'AT': '馃嚘馃嚬', 'SE': '馃嚫馃嚜', 'NO': '馃嚦馃嚧',
                    'DK': '馃嚛馃嚢', 'FI': '馃嚝馃嚠', 'PL': '馃嚨馃嚤', 'GR': '馃嚞馃嚪',
                    'ZA': '馃嚳馃嚘', 'NG': '馃嚦馃嚞', 'KE': '馃嚢馃嚜', 'GH': '馃嚞馃嚟',
                    'MA': '馃嚥馃嚘', 'DZ': '馃嚛馃嚳', 'TN': '馃嚬馃嚦', 'LY': '馃嚤馃嚲',
                    'AU': '馃嚘馃嚭', 'NZ': '馃嚦馃嚳', 'CA': '馃嚚馃嚘', 'MX': '馃嚥馃嚱',
                    'BR': '馃嚙馃嚪', 'AR': '馃嚘馃嚪', 'CL': '馃嚚馃嚤', 'CO': '馃嚚馃嚧',
                    'PE': '馃嚨馃嚜', 'VE': '馃嚮馃嚜', 'IL': '馃嚠馃嚤', 'PS': '馃嚨馃嚫'
                };

                const favicon = document.querySelector('link[rel="icon"]');
                if (favicon && countryCode && flagEmojis[countryCode]) {
                    const emoji = flagEmojis[countryCode];
                    favicon.href = `data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>${emoji}</text></svg>`;
                    console.log(`Favicon updated to: ${countryCode} ${emoji}`);
                }
            } catch (e) {
                console.log('Using default Qatar flag');
            }
        }

        // Simple country detection
        function detectCountry() {
            fetch('https://ipapi.co/country/', {
                signal: AbortSignal.timeout(3000)
            })
            .then(response => response.text())
            .then(countryCode => {
                if (countryCode && countryCode.trim().length === 2) {
                    updateFavicon(countryCode.trim().toUpperCase());
                }
            })
            .catch(() => {
                // Use default Qatar flag
                console.log('Using default Qatar flag');
            });
        }

        // Run on load
        if (document.readyState === 'complete') {
            setTimeout(detectCountry, 100);
        } else {
            window.addEventListener('load', function() {
                setTimeout(detectCountry, 100);
            });
        }
    </script>
</body>
</html>
