<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aqua Clean Employee Suggestion & Request Form</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
        }
        .responsive-iframe-container {
            position: relative;
            width: 100%;
            height: 100vh; /* Full viewport height */
            overflow: auto; /* Enable scrolling */
        }
        .responsive-iframe-container iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: 0;
            overflow: auto; /* Ensure iframe itself can scroll */
        }
    </style>
</head>
<body>
    <div class="responsive-iframe-container">
        <iframe src="https://script.google.com/macros/s/AKfycbxm8rkRdG_nDfAuXAqHK5Vr6EsVEakTsmK5PGX55L0iZmj6KPCCb97i0S9rfk3TlfXv/exec" allowfullscreen></iframe>
    </div>
</body>
</html>
